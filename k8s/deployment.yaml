# LumApps MCP Server — Deployment
# Apply after creating the ConfigMap and Secret (see configmap.yaml, secrets.yaml).
# Example: kubectl apply -f k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumapps-mcp-server
  labels:
    app: lumapps-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lumapps-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lumapps-mcp-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: lumapps-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lumapps-mcp-config
            - secretRef:
                name: lumapps-mcp-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          terminationGracePeriodSeconds: 10
      restartPolicy: Always
