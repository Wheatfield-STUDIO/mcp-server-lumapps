# LumApps MCP Server — secret values (credentials)
# Replace placeholder values with base64-encoded real credentials before applying.
# Example: echo -n "your-api-key" | base64
# DO NOT commit real secrets. Prefer: kubectl create secret generic lumapps-mcp-secrets --from-literal=... 
# or use a secret manager (e.g. External Secrets, Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: lumapps-mcp-secrets
  labels:
    app: lumapps-mcp-server
type: Opaque
stringData:
  # Required: API key for MCP clients (Cursor, Copilot Studio)
  MCP_API_KEY: "REPLACE_ME"
  # Read app (all.read): use LUMAPPS_READ_* or legacy LUMAPPS_CLIENT_*
  LUMAPPS_READ_CLIENT_ID: "REPLACE_ME"
  LUMAPPS_READ_CLIENT_SECRET: "REPLACE_ME"
  # Optional: admin app (all.admin) for modification tools
  # LUMAPPS_ADMIN_CLIENT_ID: "REPLACE_ME"
  # LUMAPPS_ADMIN_CLIENT_SECRET: "REPLACE_ME"
  # Optional: direct token (tests only); if set, read/admin client IDs are not used
  # LUMAPPS_ACCESS_TOKEN: "REPLACE_ME"
---
# Alternative: reference existing secret keys (no inline values).
# Uncomment and adapt if you manage secrets externally:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: lumapps-mcp-secrets
# type: Opaque
# data:
#   MCP_API_KEY: <base64>
#   LUMAPPS_READ_CLIENT_ID: <base64>
#   LUMAPPS_READ_CLIENT_SECRET: <base64>
#   LUMAPPS_ADMIN_CLIENT_ID: <base64>   # optional
#   LUMAPPS_ADMIN_CLIENT_SECRET: <base64> # optional
